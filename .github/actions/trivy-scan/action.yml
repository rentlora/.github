name: 'Trivy Scan'
description: 'Runs Trivy vulnerability scanner on an image and uploads SARIF'
inputs:
  image-ref:
    description: 'Image reference to scan'
    required: true
  category:
    description: 'Category for SARIF upload (e.g., image-frontend)'
    required: true
runs:
  using: "composite"
  steps:
    - name: Trivy gate — CRITICAL
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: table
        severity: CRITICAL
        exit-code: "1"
        ignore-unfixed: true
        vuln-type: os,library
    - name: Trivy scan — SARIF
      if: always()
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: sarif
        output: trivy-results.sarif
        severity: HIGH,CRITICAL
        exit-code: "0"
        ignore-unfixed: true
        vuln-type: os,library
    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
        category: ${{ inputs.category }}
